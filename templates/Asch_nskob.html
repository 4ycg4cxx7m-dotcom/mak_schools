<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новосибирская область - Школы рядом!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0062cc, #004a99);
            --primary-dark: linear-gradient(135deg, #004a99, #003366);
            --primary-light: linear-gradient(90deg, #0062cc, #00a8e8);
            --bg-color: #f0f4f8;
            --panel-bg: #fff;
            --border-color: #0062cc;
            --text-dark: #2D2F33;
            --shadow-blue: 0 4px 12px rgba(0, 98, 204, 0.3);
            --shadow-blue-hover: 0 6px 16px rgba(0, 74, 153, 0.6);
            --shadow-panel: 0 20px 60px rgba(0, 98, 204, 0.25);
            --uniform-gap: 1.5rem;
            --header-gradient: linear-gradient(135deg, #0052b3, #004080);
            --small-gap: 0.5rem;
            --mobile-section-gap: 4rem;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', 'Arial', sans-serif;
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 6px;
            background: #0062cc;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            z-index: 1000;
            border-radius: 4px;
            font-weight: 500;
        }

        .skip-link:focus { top: 6px; }

        button:focus, a:focus, input:focus {
            outline: 3px solid #0062cc;
            outline-offset: 2px;
        }

        .main-container {
            max-width: 1400px;
            width: 95%;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4rem;
            min-height: 80vh;
        }

        /* ✅ НАВИГАЦИЯ ДЕСКТОП */
        .navigation-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 1050;
            transition: all 0.3s ease;
            width: 80%;
            max-width: 380px;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        .navigation-panel button {
            flex: 1;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 10px;
            text-align: center;
            user-select: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-blue);
            border: none;
            color: white;
            background: var(--primary-gradient);
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.3;
        }

        .navigation-panel button:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-blue-hover);
            transform: translateY(-1px);
        }

        /* ✅ МОБИЛЬНАЯ НАВИГАЦИЯ */
        .mobile-nav {
            position: fixed;
            bottom: 25px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .mobile-nav button {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            font-size: 24px;
            padding: 0;
            background: var(--primary-gradient);
            color: white;
            border: none;
            box-shadow: var(--shadow-blue);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-nav button:hover,
        .mobile-nav button:active {
            transform: scale(1.1);
            box-shadow: var(--shadow-blue-hover);
        }

        /* ✅ ТОГГЛЕР ПАНЕЛИ */
        .toggle-panel-btn {
            position: fixed;
            top: 20px;
            left: 25px;
            z-index: 2000;
            width: 55px;
            height: 55px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: var(--shadow-blue-hover);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-panel-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-panel);
        }

        .toggle-panel-btn i {
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toggle-panel-btn.active i {
            transform: rotate(90deg);
        }

        /* ✅ БОКОВАЯ ПАНЕЛЬ */
        .side-panel {
            position: fixed;
            top: 0;
            left: -400px;
            width: 380px;
            height: 100vh;
            background: var(--panel-bg);
            border-radius: 0 20px 20px 0;
            box-shadow: var(--shadow-panel);
            z-index: 1500;
            transition: left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow-y: auto;
            border-right: 2px solid var(--border-color);
        }

        .side-panel.active {
            left: 0;
        }

        .panel-header {
            padding: 2rem 2rem 2rem 90px;
            background: var(--header-gradient);
            color: white;
            border-radius: 0 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .panel-content {
            padding: 1rem 2rem 2rem;
        }

        .panel-btn {
            display: block;
            width: 100%;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            background: var(--panel-bg);
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-weight: 600;
            text-align: left;
            transition: all 0.3s ease;
            box-shadow: none;
            font-size: 0.92rem;
            font-family: 'Inter', Arial, sans-serif;
        }

        .panel-btn:hover {
            background: var(--primary-gradient);
            color: white;
            border-color: var(--primary-gradient);
            transform: translateX(6px);
            box-shadow: var(--shadow-panel);
        }

        /* ✅ ЗАГОЛОВКИ */
        .title-with-spacing {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: var(--small-gap) !important;
            letter-spacing: -0.02em;
            text-align: center;
            color: #333;
        }

        /* ✅ НОВАЯ КНОПКА РЕЙТИНГА ЕГЭ */
        .ege-ranking-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-dark);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            height: 70px;
            font-weight: 600;
            font-size: 1.1rem;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        .ege-ranking-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .ege-ranking-btn:hover::before {
            transform: scaleX(1);
        }

        .ege-ranking-btn:hover {
            transform: translateY(-4px);
            border-color: var(--border-color);
            box-shadow: var(--shadow-panel);
            color: var(--text-dark);
        }

        .ege-ranking-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
            box-shadow: var(--shadow-blue);
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--text-dark);
            text-align: center;
            margin: 2rem 0 2.5rem;
            position: relative;
            font-weight: 600;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--primary-light);
            border-radius: 2px;
        }

        /* ✅ ОБЛАСТЬ/ГОРОД */
        .oblast-wrapper {
            width: 100%;
            margin-bottom: var(--uniform-gap) !important;
            max-width: 1000px;
        }

        .oblast-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--uniform-gap);
            margin-top: var(--small-gap);
            justify-items: center;
        }

        .oblast-btn {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 2.8rem 3rem;
            background: var(--panel-bg);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-dark);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            height: 200px;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .oblast-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .oblast-btn:hover::before {
            transform: scaleX(1);
        }

        .oblast-btn:hover {
            transform: translateY(-8px);
            border-color: var(--border-color);
            box-shadow: var(--shadow-panel);
            color: var(--text-dark);
        }

        .oblast-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            flex-shrink: 0;
            box-shadow: var(--shadow-blue);
        }

        .oblast-title {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
            margin: 0;
        }

        /* ✅ МОБИЛЬНЫЕ СТИЛИ */
        @media (max-width: 1200px) {
            .main-container { width: 98%; }
        }

        @media (max-width: 992px) {
            .navigation-panel { 
                flex-direction: column;
                width: 85%;
                max-width: 300px;
                gap: 0.75rem;
            }
        }

        @media (max-width: 768px) {
            :root { 
                --uniform-gap: 1.2rem; 
                --small-gap: 1rem;
                --mobile-section-gap: 4rem;
            }
            body { 
                padding-top: 10px !important; 
                padding-bottom: 90px; 
            }
            .content-wrapper { padding-top: 1rem !important; margin-top: 1rem !important; }
            .title-with-spacing { margin-bottom: var(--small-gap) !important; }
            .main-container { padding-top: 1rem !important; margin-top: 0.5rem !important; }
            
            .oblast-grid { 
                grid-template-columns: 1fr; 
                gap: var(--uniform-gap) !important; 
                margin-top: var(--mobile-section-gap) !important;
            }
            .section-title { 
                margin: var(--mobile-section-gap) 0 2rem !important;
            }
            .oblast-btn { 
                height: 220px; 
                padding: 2.5rem 2.5rem; 
            }
            .oblast-icon { width: 75px; height: 75px; font-size: 30px; }
            .oblast-title { font-size: 1.7rem; }
            .toggle-panel-btn { top: 15px; left: 20px; width: 50px; height: 50px; }
            .panel-header { padding: 1.8rem 1.8rem 1.8rem 80px; }
            .side-panel { width: 90%; left: -90%; }
            .navigation-panel { display: none !important; }
            .mobile-nav { display: flex !important; }

            .ege-ranking-btn {
                height: 75px;
                padding: 1.2rem 2rem;
                font-size: 1.15rem;
                max-width: 500px;
            }
            .ege-ranking-icon {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }
        }

        @media (max-width: 576px) {
            :root { 
                --uniform-gap: 1rem; 
                --small-gap: 0.75rem;
                --mobile-section-gap: 3.5rem;
            }
            .oblast-grid { 
                margin-top: var(--mobile-section-gap) !important;
            }
            .oblast-btn { 
                height: 210px; 
                padding: 2.2rem 2rem; 
            }
            .oblast-icon { width: 70px; height: 70px; font-size: 28px; }
            .oblast-title { font-size: 1.5rem; }
            .toggle-panel-btn { width: 45px; height: 45px; font-size: 1.2rem; }
            .mobile-nav button { width: 46px; height: 46px; font-size: 22px; }

            .ege-ranking-btn {
                height: 72px;
                padding: 1.1rem 1.8rem;
                max-width: 90vw;
            }
            .ege-ranking-icon {
                width: 46px;
                height: 46px;
                font-size: 21px;
            }
        }

        @supports (padding: max(0px)) {
            body { padding-bottom: max(90px, env(safe-area-inset-bottom)); }
            .navigation-panel { bottom: max(20px, env(safe-area-inset-bottom)); }
            .mobile-nav { bottom: max(25px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Перейти к основному содержимому</a>

    <!-- ✅ НАВИГАЦИЯ ДЕСКТОП (ТОЛЬКО ГЛАВНАЯ) -->
    <nav class="navigation-panel" id="navigationPanel" role="navigation" aria-label="Основная навигация">
        <button onclick="location.href='{{ url_for('domoi') }}'" aria-label="Перейти на главную страницу">
            🏠 Главная
        </button>
    </nav>

    <!-- ✅ ТОГГЛЕР ПАНЕЛИ -->
    <button class="toggle-panel-btn" id="togglePanel" title="Меню" aria-label="Открыть меню" aria-expanded="false">
        <i class="fas fa-bars" aria-hidden="true"></i>
    </button>

    <!-- ✅ БОКОВАЯ ПАНЕЛЬ -->
    <div class="side-panel" id="sidePanel" role="navigation" aria-label="Расширенная навигация">
        <div class="panel-header">
            <h3>
                <i class="fas fa-th me-2" aria-hidden="true"></i>Навигация
            </h3>
        </div>
        
        <div class="panel-content">
            <a href="{{ url_for('search') }}" class="panel-btn">
                <i class="fas fa-search me-3" aria-hidden="true"></i>Поиск на сайте
            </a>
            <a href="{{ url_for('all_schools') }}" class="panel-btn">
                <i class="fas fa-list me-3" aria-hidden="true"></i>Все школы
            </a>
            <a href="{{ url_for('support') }}" class="panel-btn">
                <i class="fas fa-life-ring me-3" aria-hidden="true"></i>Техподдержка
            </a>
            <a href="{{ url_for('support_author') }}" class="panel-btn">
                <i class="fas fa-heart me-3" aria-hidden="true"></i>Поддержать проект
            </a>
            <a href="{{ url_for('Информация_о_сайте') }}" class="panel-btn">
                <i class="fas fa-info-circle me-3" aria-hidden="true"></i>О сайте
            </a>
            <a href="{{ url_for('Политика_Конфиденциальности') }}" class="panel-btn">
                <i class="fas fa-shield-alt me-3" aria-hidden="true"></i>Политика конфиденциальности
            </a>
        </div>
    </div>

    <!-- ✅ ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-container">
        <div class="content-wrapper">
            <!-- ✅ ЗАГОЛОВОК -->
            <h1 class="title-with-spacing">Новосибирская область</h1>
            
            <!-- ✅ ✅ КНОПКА РЕЙТИНГА ПОД ЗАГОЛОВКОМ -->
            <a href="#" class="ege-ranking-btn" aria-label="Рейтинг школ по результатам ЕГЭ">
                <div class="ege-ranking-icon">
                    <i class="fas fa-chart-line" aria-hidden="true"></i>
                </div>
                Рейтинг по результатам ЕГЭ
            </a>
            
            <div class="oblast-wrapper">
                <h2 class="section-title" id="main-content">Города и районы</h2>
                <div class="oblast-grid">
                    <a href="{{ url_for('Novosibirsk') }}" class="oblast-btn" aria-label="Новосибирск">
                        <div class="oblast-icon">
                            <i class="fas fa-city" aria-hidden="true"></i>
                        </div>
                        <h3 class="oblast-title">Новосибирск</h3>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ МОБИЛЬНАЯ НАВИГАЦИЯ (ТОЛЬКО ГЛАВНАЯ) -->
    <div class="mobile-nav">
        <button onclick="location.href='{{ url_for('domoi') }}'" title="Главная" aria-label="Главная">
            🏠
        </button>
    </div>

    <script>
        function updateNavigationPosition() {
            const navPanel = document.getElementById('navigationPanel');
            if (navPanel) navPanel.style.bottom = '20px';
        }

        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            const btn = document.getElementById('togglePanel');
            const isActive = panel.classList.toggle('active');
            btn.classList.toggle('active', isActive);
            btn.setAttribute('aria-expanded', isActive);
        }

        document.getElementById('togglePanel').addEventListener('click', function(e) {
            e.stopPropagation();
            togglePanel();
        });

        document.addEventListener('click', function(event) {
            const panel = document.getElementById('sidePanel');
            const btn = document.getElementById('togglePanel');
            if (!panel.contains(event.target) && !btn.contains(event.target) && panel.classList.contains('active')) {
                togglePanel();
            }
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const panel = document.getElementById('sidePanel');
                if (panel.classList.contains('active')) {
                    togglePanel();
                }
            }
        });

        window.addEventListener('resize', updateNavigationPosition);
        window.addEventListener('load', updateNavigationPosition);
    </script>
</body>
</html>
